<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade Smart Tracker</title>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-E2TN42CXH9"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-E2TN42CXH9');
</script>

<style>
body{
  background:#0f172a;
  color:white;
  font-family:Arial;
  padding:30px;
}

.box{
  background:#111827;
  padding:25px;
  border-radius:16px;
  max-width:800px;
  margin:auto;
  border:1px solid #1f2937;
}

h1{
  font-size:28px;
  margin-bottom:5px;
}

.sub{
  opacity:0.7;
  margin-bottom:20px;
}

.badge{
  display:inline-block;
  padding:5px 10px;
  background:#1f2937;
  border-radius:6px;
  font-size:12px;
  opacity:0.8;
  margin-bottom:15px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

input, select{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:none;
  background:#1f2937;
  color:white;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#22c55e;
  border:none;
  border-radius:8px;
  font-size:15px;
  cursor:pointer;
  font-weight:bold;
}

table{
  width:100%;
  margin-top:20px;
  background:#1f2937;
  border-radius:10px;
  overflow:hidden;
}

td,th{
  padding:10px;
  text-align:center;
  border-bottom:1px solid #111827;
}

.win{ color:#22c55e; }
.loss{ color:#ef4444; }

small{
  opacity:0.6;
  display:block;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="box">

<div class="badge">📊 Trading Journal + Risk Tool</div>

<h1>Trade Smarter. Not Harder.</h1>

<p class="sub">
Track every trade and calculate your performance.
</p>

<div class="grid">

<div>
<h3>Risk Calculator</h3>

<input id="account" value="1000" placeholder="Account $">
<input id="risk" value="1" placeholder="Risk %">
<input id="entry" value="2300" placeholder="Entry">
<input id="stop" value="2280" placeholder="Stop Loss">

<button onclick="calculateRisk()">Calculate</button>

<h3 id="riskResult"></h3>
</div>

<div>
<h3>New Trade</h3>

<select id="type">
<option>BUY</option>
<option>SELL</option>
</select>

<input id="tradeEntry" value="2300" placeholder="Entry">
<input id="exit" value="2340" placeholder="Exit">

<button onclick="addTrade()">Add Trade</button>
</div>

</div>

<h3>Trade Journal</h3>

<table>
<tr>
<th>Type</th>
<th>Entry</th>
<th>Exit</th>
<th>Result</th>
</tr>
<tbody id="journal"></tbody>
</table>

<h2 id="total"></h2>
<h3 id="stats"></h3>

</div>

<script>

let trades = JSON.parse(localStorage.getItem("trades")) || [];

function save(){
  localStorage.setItem("trades", JSON.stringify(trades));
}

function calculateRisk(){
  let account = Number(document.getElementById("account").value);
  let risk = Number(document.getElementById("risk").value);
  let stop = Number(document.getElementById("stop").value);
  let entry = Number(document.getElementById("entry").value);

  let money = account * risk / 100;
  let distance = Math.abs(entry - stop);

  document.getElementById("riskResult").innerText =
  "Risk: $" + money.toFixed(2);
}

function addTrade(){

  let type = document.getElementById("type").value;
  let entry = Number(document.getElementById("tradeEntry").value);
  let exit = Number(document.getElementById("exit").value);

  let result = (type === "BUY") ? (exit - entry) : (entry - exit);

  trades.push({type, entry, exit, result});

  save();
  showTrades();
}

function showTrades(){

  let table = document.getElementById("journal");
  table.innerHTML = "";

  let total = 0;
  let wins = 0;
  let losses = 0;

  trades.forEach(t => {

    total += t.result;

    if(t.result > 0) wins++;
    else losses++;

    let row = document.createElement("tr");

    row.innerHTML = `
      <td>${t.type}</td>
      <td>${t.entry}</td>
      <td>${t.exit}</td>
      <td class="${t.result >= 0 ? "win" : "loss"}">${t.result.toFixed(2)}</td>
    `;

    table.appendChild(row);
  });

  let winrate = trades.length ? (wins / trades.length) * 100 : 0;

  document.getElementById("total").innerText =
  "Total P/L: " + total.toFixed(2);

  document.getElementById("stats").innerHTML =
  "Trades: " + trades.length +
  "<br>Wins: " + wins +
  "<br>Losses: " + losses +
  "<br>Win rate: " + winrate.toFixed(1) + "%";
}

showTrades();

</script>

</body>
</html>
