<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade Smart SaaS Pro</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script src="https://js.stripe.com/v3/"></script>

<style>
body{background:#0b1220;color:white;font-family:Arial;padding:20px}
.box{max-width:900px;margin:auto;background:#111827;padding:20px;border-radius:12px}
input,button,select{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:none}
input,select{background:#1f2937;color:white}
button{background:#22c55e;color:white;font-weight:bold;cursor:pointer}
.secondary{background:#3b82f6}
.danger{background:#ef4444}
table{width:100%;margin-top:20px;background:#1f2937;border-radius:10px}
td,th{padding:10px;text-align:center}
.win{color:#22c55e}
.loss{color:#ef4444}
.hidden{display:none}
</style>
</head>

<body>

<div class="box">

<h2>📊 Trade SaaS Pro</h2>

<!-- AUTH -->
<div id="authBox">
  <input id="email" placeholder="email">
  <input id="pass" type="password" placeholder="password">
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<h3 id="user"></h3>

<button onclick="logout()">Logout</button>

<!-- PAYMENTS -->
<div id="payBox">
  <h3>Upgrade to Pro</h3>
  <button class="secondary" onclick="buyPro()">💳 Buy Pro ($9.99/month)</button>
</div>

<h3>New Trade</h3>

<select id="type">
<option>BUY</option>
<option>SELL</option>
</select>

<input id="entry" placeholder="Entry">
<input id="exit" placeholder="Exit">

<button onclick="addTrade()">Add Trade</button>

<table>
<tr><th>Type</th><th>Entry</th><th>Exit</th><th>Result</th></tr>
<tbody id="list"></tbody>
</table>

</div>

</div>

<script>
// FIREBASE
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// STRIPE
const stripe = Stripe("YOUR_STRIPE_PUBLIC_KEY");

let currentUser = null;
let isPro = false;

// AUTH
function signup(){
  auth.createUserWithEmailAndPassword(email.value, pass.value);
}

function login(){
  auth.signInWithEmailAndPassword(email.value, pass.value);
}

function logout(){
  auth.signOut();
}

// CHECK USER
auth.onAuthStateChanged(async user=>{
  if(user){
    currentUser = user;
    document.getElementById("authBox").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    document.getElementById("user").innerText = user.email;

    checkPro();
    loadTrades();
  } else {
    document.getElementById("authBox").classList.remove("hidden");
    document.getElementById("app").classList.add("hidden");
  }
});

// PRO CHECK
async function checkPro(){
  let doc = await db.collection("users").doc(currentUser.uid).get();
  isPro = doc.exists && doc.data().pro === true;
}

// STRIPE BUY
async function buyPro(){
  const res = await fetch("https://YOUR_BACKEND/create-checkout-session");
  const data = await res.json();
  await stripe.redirectToCheckout({ sessionId: data.id });
}

// ADD TRADE
async function addTrade(){

  if(!isPro){
    let snap = await db.collection("trades")
      .where("uid","==",currentUser.uid).get();

    if(snap.size >= 10){
      alert("Free limit reached. Upgrade to Pro.");
      return;
    }
  }

  await db.collection("trades").add({
    uid: currentUser.uid,
    type: type.value,
    entry: +entry.value,
    exit: +exit.value,
    result: type.value==="BUY" ? (exit.value-entry.value) : (entry.value-exit.value),
    time: Date.now()
  });

  loadTrades();
}

// LOAD
async function loadTrades(){
  let snap = await db.collection("trades")
    .where("uid","==",currentUser.uid)
    .get();

  let html = "";

  snap.forEach(d=>{
    let t = d.data();
    html += `
      <tr>
        <td>${t.type}</td>
        <td>${t.entry}</td>
        <td>${t.exit}</td>
        <td class="${t.result>=0?'win':'loss'}">${t.result}</td>
      </tr>
    `;
  });

  list.innerHTML = html;
}
</script>

</body>
</html>
