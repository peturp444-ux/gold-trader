 <!DOCTYPE html>
<html>
<head>
<title>Gold Trader Assistant</title>

<style>
body{
background:#111827;
color:white;
font-family:Arial;
padding:30px;
}

.box{
background:#1f2937;
padding:20px;
border-radius:15px;
max-width:700px;
}

input, select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#f59e0b;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

table{
width:100%;
margin-top:20px;
background:#374151;
}

td,th{
padding:10px;
border-bottom:1px solid #555;
}

.win{ color:#22c55e; }
.loss{ color:#ef4444; }

.delete{ background:#dc2626; }
</style>

</head>

<body>

<h1>🟡 Gold Trader Assistant</h1>

<div class="box">

<h2>Risk Calculator</h2>

<input id="account" value="1000" placeholder="Account $">
<input id="risk" value="1" placeholder="Risk %">
<input id="stop" value="2280" placeholder="Stop Loss">
<input id="riskEntry" value="2300" placeholder="Entry Price">

<button onclick="calculateRisk()">Calculate Risk</button>

<h3 id="riskResult"></h3>
<h3 id="lotResult"></h3>

<hr>

<h2>New Trade</h2>

<select id="type">
<option>BUY</option>
<option>SELL</option>
</select>

<input id="entry" value="2300" placeholder="Entry">
<input id="exit" value="2340" placeholder="Exit">

<button onclick="addTrade()">Add Trade</button>

<h2>Trade Journal</h2>

<table>
<tr>
<th>Type</th>
<th>Entry</th>
<th>Exit</th>
<th>Result ($)</th>
<th></th>
</tr>

<tbody id="journal"></tbody>
</table>

<h2 id="total"></h2>
<h3 id="stats"></h3>

<canvas id="chart" width="700" height="250"></canvas>

</div>

<script>

let trades = JSON.parse(localStorage.getItem("trades")) || [];

function save(){
localStorage.setItem("trades",JSON.stringify(trades));
}

function calculateRisk(){

let account = Number(document.getElementById("account").value);
let risk = Number(document.getElementById("risk").value);
let stop = Number(document.getElementById("stop").value);
let entry = Number(document.getElementById("riskEntry").value);

let money = account * risk / 100;

document.getElementById("riskResult").innerHTML =
"Risk money: $" + money.toFixed(2);

let distance = Math.abs(entry - stop);

if(distance > 0){
let lot = (money / distance).toFixed(2);
document.getElementById("lotResult").innerHTML =
"Lot Size: " + lot;
}else{
document.getElementById("lotResult").innerHTML =
"Invalid Entry/Stop";
}
}

function addTrade(){

let type = document.getElementById("type").value;
let entry = Number(document.getElementById("entry").value);
let exit = Number(document.getElementById("exit").value);

let result = (type == "BUY") ? (exit - entry) : (entry - exit);

trades.push({
type,
entry,
exit,
result
});

save();
showTrades();
drawChart();
}

function showTrades(){

let table = document.getElementById("journal");
table.innerHTML = "";

let total = 0;
let wins = 0;
let losses = 0;

trades.forEach((t,index)=>{

total += t.result;

if(t.result > 0) wins++;
else losses++;

let color = t.result >= 0 ? "win" : "loss";

let row = document.createElement("tr");

row.innerHTML =
"<td>"+t.type+"</td>"+
"<td>"+t.entry+"</td>"+
"<td>"+t.exit+"</td>"+
"<td class='"+color+"'>"+t.result.toFixed(2)+"</td>"+
'<td><button class="delete" onclick="removeTrade('+index+')">X</button></td>';

table.appendChild(row);

});

let winrate = trades.length ? (wins/trades.length)*100 : 0;

document.getElementById("total").innerHTML =
"Total P/L: " + total.toFixed(2);

document.getElementById("stats").innerHTML =
"Trades: "+trades.length+
"<br>Wins: "+wins+
"<br>Losses: "+losses+
"<br>Win rate: "+winrate.toFixed(1)+"%";
}

function removeTrade(index){
trades.splice(index,1);
save();
showTrades();
drawChart();
}

function drawChart(){

let canvas = document.getElementById("chart");
let ctx = canvas.getContext("2d");

ctx.clearRect(0,0,700,250);

let sum = 0;
let points = [];

trades.forEach(t=>{
sum += t.result;
points.push(sum);
});

ctx.strokeStyle = "#22c55e";
ctx.lineWidth = 3;
ctx.beginPath();

points.forEach((p,i)=>{

let x = i*70 + 40;
let y = 200 - p;

if(i==0) ctx.moveTo(x,y);
else ctx.lineTo(x,y);

ctx.fillStyle = "#f59e0b";
ctx.beginPath();
ctx.arc(x,y,4,0,Math.PI*2);
ctx.fill();

});

ctx.stroke();
}

showTrades();
drawChart();

</script>

</body>
</html>
