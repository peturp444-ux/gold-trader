<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade Smart Tracker</title>

<!-- Google tag -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-E2TN42CXH9"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-E2TN42CXH9');
</script>

<style>
body{
  background:#0f172a;
  color:white;
  font-family:Arial;
  padding:30px;
}

.box{
  background:#111827;
  padding:25px;
  border-radius:16px;
  max-width:900px;
  margin:auto;
  border:1px solid #1f2937;
}

h1{margin-bottom:5px;}
.sub{opacity:0.7;margin-bottom:20px;}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

input,select,button{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}

input,select{
  background:#1f2937;
  color:white;
}

button{
  background:#22c55e;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

table{
  width:100%;
  margin-top:20px;
  background:#1f2937;
  border-radius:10px;
  overflow:hidden;
}

td,th{
  padding:10px;
  text-align:center;
  border-bottom:1px solid #111827;
}

.win{color:#22c55e;}
.loss{color:#ef4444;}

canvas{
  margin-top:20px;
  background:#0b1220;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="box">

<h1>📊 Trade Smart Tracker</h1>
<p class="sub">Track trades, risk & performance</p>

<button onclick="unlockPro()">🔓 Unlock Pro</button>
<button onclick="exportCSV()">⬇️ Export CSV</button>

<div class="grid">

<div>
<h3>Risk Calculator</h3>

<input id="account" value="1000">
<input id="risk" value="1">
<input id="entry" value="2300">
<input id="stop" value="2280">

<button onclick="calculateRisk()">Calculate</button>

<h3 id="riskResult"></h3>
</div>

<div>
<h3>New Trade</h3>

<select id="type">
<option>BUY</option>
<option>SELL</option>
</select>

<input id="tradeEntry" value="2300">
<input id="exit" value="2340">

<button onclick="addTrade()">Add Trade</button>
</div>

</div>

<h3>Journal</h3>

<table>
<tr>
<th>Type</th>
<th>Entry</th>
<th>Exit</th>
<th>Result</th>
</tr>
<tbody id="journal"></tbody>
</table>

<h3 id="total"></h3>
<h3 id="stats"></h3>

<canvas id="chart" width="800" height="250"></canvas>

</div>

<script>

let trades = JSON.parse(localStorage.getItem("trades")) || [];
let isPro = localStorage.getItem("pro") === "true";

function save(){
  localStorage.setItem("trades", JSON.stringify(trades));
}

function calculateRisk(){
  let account = +document.getElementById("account").value;
  let risk = +document.getElementById("risk").value;

  let money = account * risk / 100;

  document.getElementById("riskResult").innerText =
  "Risk: $" + money.toFixed(2);
}

function addTrade(){

  if(!isPro && trades.length >= 10){
    alert("Free limit reached. Unlock Pro.");
    return;
  }

  let type = document.getElementById("type").value;
  let entry = +document.getElementById("tradeEntry").value;
  let exit = +document.getElementById("exit").value;

  let result = type === "BUY" ? (exit - entry) : (entry - exit);

  trades.push({type, entry, exit, result});

  save();
  render();
  draw();
}

function render(){

  let t = document.getElementById("journal");
  t.innerHTML = "";

  let sum = 0, wins = 0, losses = 0;

  trades.forEach(x=>{
    sum += x.result;
    x.result > 0 ? wins++ : losses++;

    let row = document.createElement("tr");
    row.innerHTML = `
      <td>${x.type}</td>
      <td>${x.entry}</td>
      <td>${x.exit}</td>
      <td class="${x.result>=0?'win':'loss'}">${x.result.toFixed(2)}</td>
    `;
    t.appendChild(row);
  });

  document.getElementById("total").innerText =
  "P/L: " + sum.toFixed(2);

  document.getElementById("stats").innerHTML =
  `Trades: ${trades.length}<br>Wins: ${wins}<br>Losses: ${losses}`;
}

function draw(){

  let c = document.getElementById("chart");
  let ctx = c.getContext("2d");

  ctx.clearRect(0,0,800,250);

  let sum = 0;
  let pts = [];

  trades.forEach(t=>{
    sum += t.result;
    pts.push(sum);
  });

  ctx.beginPath();
  ctx.strokeStyle = "#22c55e";

  pts.forEach((p,i)=>{
    let x = i*60 + 40;
    let y = 200 - p;

    if(i==0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  });

  ctx.stroke();
}

function exportCSV(){
  let csv = "type,entry,exit,result\n";

  trades.forEach(t=>{
    csv += `${t.type},${t.entry},${t.exit},${t.result}\n`;
  });

  let blob = new Blob([csv], {type:"text/csv"});
  let url = URL.createObjectURL(blob);

  let a = document.createElement("a");
  a.href = url;
  a.download = "trades.csv";
  a.click();
}

function unlockPro(){
  let code = prompt("Code:");
  if(code === "GOLD-2026"){
    localStorage.setItem("pro","true");
    isPro = true;
    alert("PRO unlocked");
  } else alert("Wrong code");
}

render();
draw();

</script>

</body>
</html>
