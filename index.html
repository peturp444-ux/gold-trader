<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade Smart SaaS</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{background:#0b1220;color:white;font-family:Arial;padding:20px}
.box{max-width:900px;margin:auto;background:#111827;padding:20px;border-radius:12px}
input,button{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:none}
input{background:#1f2937;color:white}
button{background:#22c55e;color:white;font-weight:bold;cursor:pointer}
table{width:100%;margin-top:20px;background:#1f2937;border-radius:10px}
td,th{padding:10px;text-align:center}
.win{color:#22c55e}
.loss{color:#ef4444}
</style>
</head>

<body>

<div class="box">

<h2>📊 Trade SaaS</h2>

<div id="authBox">
  <input id="email" placeholder="email">
  <input id="pass" type="password" placeholder="password">
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">

<h3 id="user"></h3>

<button onclick="logout()">Logout</button>

<h3>New Trade</h3>

<select id="type">
<option>BUY</option>
<option>SELL</option>
</select>

<input id="entry" placeholder="Entry">
<input id="exit" placeholder="Exit">

<button onclick="addTrade()">Add</button>

<table>
<thead>
<tr><th>Type</th><th>Entry</th><th>Exit</th><th>Result</th></tr>
</thead>
<tbody id="list"></tbody>
</table>

</div>

</div>

<script>
// 🔥 FIREBASE CONFIG (replace with yours)
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;

// AUTH
function signup(){
  auth.createUserWithEmailAndPassword(email.value, pass.value);
}

function login(){
  auth.signInWithEmailAndPassword(email.value, pass.value);
}

function logout(){
  auth.signOut();
}

auth.onAuthStateChanged(async user=>{
  if(user){
    currentUser = user;
    document.getElementById("authBox").style.display="none";
    document.getElementById("app").style.display="block";
    document.getElementById("user").innerText = user.email;
    loadTrades();
  } else {
    document.getElementById("authBox").style.display="block";
    document.getElementById("app").style.display="none";
  }
});

// TRADES
async function addTrade(){
  await db.collection("trades").add({
    uid: currentUser.uid,
    type: type.value,
    entry: +entry.value,
    exit: +exit.value,
    result: type.value==="BUY" ? (exit.value-entry.value) : (entry.value-exit.value),
    time: Date.now()
  });
  loadTrades();
}

async function loadTrades(){
  let snap = await db.collection("trades")
    .where("uid","==",currentUser.uid)
    .get();

  let html="";
  snap.forEach(doc=>{
    let t = doc.data();
    html += `
      <tr>
        <td>${t.type}</td>
        <td>${t.entry}</td>
        <td>${t.exit}</td>
        <td class="${t.result>=0?'win':'loss'}">${t.result}</td>
      </tr>
    `;
  });

  list.innerHTML = html;
}
</script>

</body>
</html>
